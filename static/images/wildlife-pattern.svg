<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">

  <defs>
    <style>
      .animal {
        fill: none;
        stroke: #1B5E20;
        stroke-width: 1.5;
        opacity: 0.25;
      }
    </style>
  </defs>

  <!-- Elephant -->
  <path class="animal" d="M50 200
           q30 -40 80 -20
           q30 10 40 30
           q10 30 -20 50
           l-10 20
           l-15 -15
           q-40 10 -75 -25 z"></path>

  <!-- Leopard -->
  <path class="animal" d="M250 180
           q40 -30 80 10
           q10 20 -10 40
           q-30 20 -70 -10
           l-10 10
           q20 -30 10 -50 z"></path>

  <!-- Hornbill -->
  <path class="animal" d="M120 80
           q40 -20 70 10
           q10 10 -10 25
           q-20 10 -50 -5
           q-10 10 -10 -30 z"></path>

  <!-- Deer -->
  <path class="animal" d="M300 90
           q20 -30 60 0
           q10 20 -10 40
           q-30 10 -50 -20 z"></path>

  <!-- Peacock -->
  <path class="animal" d="M200 300
           q50 -50 100 0
           q-40 -10 -80 10
           q-20 10 -20 -10 z"></path>

</svg>