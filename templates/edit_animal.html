{% extends "base.html" %}
{% block title %}Edit Animal{% endblock %}

{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<div style="max-width:1100px; margin:50px auto;">

    <div style="background:white;
                padding:40px;
                border-radius:14px;
                box-shadow:0 10px 30px rgba(0,0,0,0.08);">

        <h2 style="margin-bottom:30px;">Edit Animal</h2>

        <form method="POST" enctype="multipart/form-data">

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">

                <input type="text" name="common_name"
                       value="{{ animal.common_name }}"
                       required
                       style="padding:12px; border:1px solid #ddd; border-radius:8px;">

                <input type="text" name="scientific_name"
                       value="{{ animal.scientific_name }}"
                       required
                       style="padding:12px; border:1px solid #ddd; border-radius:8px;">

                <select name="habitat"
                        style="padding:12px; border:1px solid #ddd; border-radius:8px;">
                    {% for h in habitats %}
                        <option value="{{ h }}"
                        {% if animal.habitat == h %}selected{% endif %}>
                            {{ h }}
                        </option>
                    {% endfor %}
                </select>

                <select name="conservation_status"
                        style="padding:12px; border:1px solid #ddd; border-radius:8px;">
                    {% for s in conservation_statuses %}
                        <option value="{{ s }}"
                        {% if animal.conservation_status == s %}selected{% endif %}>
                            {{ s }}
                        </option>
                    {% endfor %}
                </select>

            </div>

            <br>

            <textarea name="description"
                      rows="4"
                      style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;">
{{ animal.description }}
            </textarea>

            <br><br>

            <!-- CURRENT IMAGE -->
            {% if animal.image %}
            <div style="margin-bottom:20px;">
                <strong>Current Image:</strong><br><br>
                <img src="{{ url_for('static', filename='images/animals/' + animal.image) }}"
                     style="max-width:300px; border-radius:10px;">
            </div>
            {% endif %}

            <!-- NEW IMAGE UPLOAD -->
            <label>Change Image</label><br><br>

            <input type="file"
                   id="imageInput"
                   name="image"
                   accept="image/*">

            <br><br>

            <div style="width:100%;
                        max-width:700px;
                        max-height:500px;
                        overflow:auto;
                        border:1px solid #ddd;
                        border-radius:12px;
                        padding:10px;
                        background:#fafafa;">

                <img id="imagePreview"
                     style="display:none; max-width:100%; border-radius:8px;">
            </div>

            <br>

            <button type="button"
                    id="cropBtn"
                    style="padding:8px 15px;
                           background:#2E7D32;
                           color:white;
                           border:none;
                           border-radius:6px;
                           display:none;">
                Crop Image
            </button>

            <input type="hidden"
                   name="cropped_image"
                   id="croppedImage">

            <br><br>

            <button type="submit"
                    style="padding:12px 25px;
                           background:#2E7D32;
                           color:white;
                           border:none;
                           border-radius:8px;
                           font-weight:500;">
                Update Animal
            </button>

        </form>

    </div>

</div>

<!-- ================= CROP SCRIPT ================= -->
<script>
let cropper;
const imageInput = document.getElementById('imageInput');
const imagePreview = document.getElementById('imagePreview');
const cropBtn = document.getElementById('cropBtn');
const croppedImageInput = document.getElementById('croppedImage');

imageInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(event) {
        imagePreview.src = event.target.result;
        imagePreview.style.display = 'block';
        cropBtn.style.display = 'inline-block';

        imagePreview.onload = function () {
            if (cropper) cropper.destroy();

            cropper = new Cropper(imagePreview, {
                aspectRatio: NaN,
                viewMode: 1,
                autoCropArea: 1,
                responsive: true,
                zoomOnWheel: true
            });
        };
    };

    reader.readAsDataURL(file);
});

cropBtn.addEventListener('click', function() {

    if (!cropper) return;

    const canvas = cropper.getCroppedCanvas({
        maxWidth: 1400,
        maxHeight: 1400,
        imageSmoothingQuality: "high"
    });

    croppedImageInput.value = canvas.toDataURL("image/jpeg", 0.82);

    alert("Image cropped successfully!");
});
</script>

{% endblock %}
