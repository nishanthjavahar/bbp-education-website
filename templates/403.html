{% extends "base.html" %}

{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-container">

        <h2 style="color:#c62828;">Access Denied</h2>

        <p>
            {{ message if message else "You do not have permission to access this page." }}
        </p>

        <a href="{{ url_for('home') }}" class="btn">
            Return to Home
        </a>

    </div>
</div>
{% endblock %}
