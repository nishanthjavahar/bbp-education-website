{% extends "base.html" %}
{% set auth_page = true %}

{% block title %}Intern Password Reset{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <h2>Intern Password Reset</h2>

        <form method="POST">
            <label>Email</label>
            <input type="email" name="email" required placeholder="Enter your email">

            <button type="submit">Generate Reset Link</button>
        </form>

        <p style="margin-top:15px;">
            <a href="{{ url_for('intern_login') }}">Back to Login</a>
        </p>
    </div>
</div>
{% endblock %}
