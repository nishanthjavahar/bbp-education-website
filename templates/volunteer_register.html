{% extends "base.html" %}
{% block title %}Volunteer Registration{% endblock %}

{% block content %}
<section style="max-width:1200px;margin:60px auto;padding:0 20px;">

    <!-- BACK BUTTON -->
    <div style="
    max-width:1200px;
    margin:30px auto 0;
    padding:0 0.5px;
">

    <a href="{{ url_for('enroll_programs') }}"
       style="
            display:inline-flex;
            align-items:center;
            gap:6px;
            padding:6px 16px;
            border-radius:30px;
            background:transparent;
            border:none;
            color:#2E7D32;
            font-size:13px;
            font-weight:500;
            text-decoration:none;
            transition:all 0.5s ease;
       "
       onmouseover="this.style.background='#EAF3EA'"
       onmouseout="this.style.background='#F6F8F6'">

        ← Back
    </a>

</div>

<div class="center-wrapper">

    <div class="register-card">
        <h2>Volunteer Registration</h2>
        <p class="subtitle">
            Join us in wildlife education and conservation outreach
        </p>

        <form method="POST">

            <label>Full Name</label>
            <input type="text" name="name" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Register</button>

        </form>
    </div>

</div>
<style>
    .center-wrapper {
    min-height: 70vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.register-card {
    background: white;
    padding: 40px 35px;
    width: 100%;
    max-width: 420px;
    border-radius: 18px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.06);
}

.register-card h2 {
    text-align: center;
    margin-bottom: 10px;
    color: #1B4332;
}

.register-card .subtitle {
    text-align: center;
    font-size: 14px;
    color: #666;
    margin-bottom: 25px;
}

.register-card input {
    width: 100%;
    padding: 12px;
    margin-bottom: 18px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

.register-card button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #1B4332;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s ease;
}

.register-card button:hover {
    background: #163a28;
}
</style>


{% endblock %}
