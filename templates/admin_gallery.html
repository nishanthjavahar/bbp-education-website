{% extends "base.html" %}
{% block title %}Manage Gallery{% endblock %}
{% block content %}
<div style="
    max-width:1100px;
    margin:20px auto 0 auto;
    padding:0 5px;
">
    <a href="{{ url_for('admin_dashboard') }}"
       style="
            display:inline-flex;
            align-items:center;
            gap:6px;
            font-size:13px;
            font-weight:500;
            padding:6px 14px;
            border-radius:20px;
            background:#f1f3f4;
            color:#444;
            text-decoration:none;
            transition:all 0.2s ease;
       "
       onmouseover="this.style.background='#e0e0e0'"
       onmouseout="this.style.background='#f1f3f4'">

        <span style="font-size:12px;">◀</span>
        Dashboard
    </a>
</div>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<section style="max-width:1100px;margin:50px auto;padding:0 20px;">

<h2 style="color:#1B5E20;margin-bottom:30px;">Gallery Manager</h2>

<form id="galleryForm">
<input type="file"
       id="imageInput"
       name="gallery_images"
       multiple
       accept="image/*">

<div id="previewGrid" style="
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
margin-top:30px;">
</div>

<button type="submit"
style="margin-top:30px;background:#1B5E20;color:white;
padding:10px 25px;border:none;border-radius:8px;">
Upload Images
</button>
</form>

<hr style="margin:60px 0;">

<h3>Existing Images</h3>

<div style="
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
margin-top:30px;">

{% for img in images %}
<div style="position:relative;">

    <img src="{{ img.image }}"
     data-id="{{ img.id }}"
     style="width:100%;height:180px;object-fit:cover;border-radius:12px;">


    <!-- 3 DOT MENU -->
    <div style="position:absolute;top:10px;right:10px;">

        <button onclick="toggleMenu(this)"
                style="background:rgba(0,0,0,0.6);
                       color:white;
                       border:none;
                       padding:6px 10px;
                       border-radius:8px;
                       cursor:pointer;
                       font-size:18px;">
            ⋮
        </button>

        <div class="dropdown-menu"
             style="display:none;
                    position:absolute;
                    right:0;
                    top:40px;
                    background:white;
                    border-radius:8px;
                    box-shadow:0 5px 15px rgba(0,0,0,0.2);
                    overflow:hidden;
                    min-width:120px;
                    z-index:100;">

            <!-- EDIT -->
            <div onclick="editExistingImage({{ img.id }}); closeAllMenus();"
                 style="padding:10px;
                        cursor:pointer;
                        transition:0.2s;">
                ✏️ Edit
            </div>

            <!-- DELETE -->
            <form method="POST"
                  action="{{ url_for('delete_gallery_image', image_id=img.id) }}"
                  onsubmit="return confirm('Delete this image?');"
                  style="margin:0;">

                <button type="submit"
                        style="width:100%;
                               border:none;
                               background:none;
                               padding:10px;
                               text-align:left;
                               cursor:pointer;">
                    🗑 Delete
                </button>
            </form>

        </div>

    </div>

</div>
{% endfor %}

</div>

</section>

<!-- ================= CROP MODAL ================= -->

<div id="cropModal" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;">

<div style="
background:white;
padding:20px;
border-radius:10px;
max-width:800px;
width:90%;">

<img id="cropImage" style="max-width:100%;">

<div style="margin-top:15px;text-align:right;">
<button onclick="closeCrop()"
        style="margin-right:10px;padding:6px 12px;">Cancel</button>

<button id="saveCrop"
        style="background:#1B5E20;color:white;
        border:none;padding:6px 14px;border-radius:6px;">
Save
</button>
</div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let cropper = null;
let currentPreviewCard = null;
let currentEditId = null;

const input = document.getElementById("imageInput");
const previewGrid = document.getElementById("previewGrid");
const form = document.getElementById("galleryForm");

const cropModal = document.getElementById("cropModal");
const cropImage = document.getElementById("cropImage");
const saveCrop = document.getElementById("saveCrop");

/* ================= FILE PREVIEW ================= */

input.addEventListener("change", function(e){

previewGrid.innerHTML = "";

Array.from(e.target.files).forEach(file => {

const reader = new FileReader();

reader.onload = function(event){

const card = document.createElement("div");
card.style.position = "relative";

const img = document.createElement("img");
img.src = event.target.result;
img.style.width = "100%";
img.style.height = "180px";
img.style.objectFit = "cover";
img.style.borderRadius = "10px";

const editBtn = document.createElement("div");
editBtn.innerHTML = "✏️";
editBtn.style.position = "absolute";
editBtn.style.top = "10px";
editBtn.style.right = "10px";
editBtn.style.background = "white";
editBtn.style.padding = "6px 10px";
editBtn.style.borderRadius = "6px";
editBtn.style.cursor = "pointer";

editBtn.onclick = function(){
openCropper(img, card);
};

card.appendChild(img);
card.appendChild(editBtn);
previewGrid.appendChild(card);

};

reader.readAsDataURL(file);
});

});

/* ================= OPEN CROPPER FOR NEW ================= */

function openCropper(imgElement, card){

currentPreviewCard = card;
currentEditId = null;

cropImage.src = imgElement.src;
cropModal.style.display = "flex";

if(cropper){
cropper.destroy();
}

cropper = new Cropper(cropImage,{
viewMode: 1,
autoCropArea: 1
});
}

/* ================= EDIT EXISTING IMAGE ================= */

window.editExistingImage = function(imageId){

currentEditId = imageId;
currentPreviewCard = null;

const imgElement = document.querySelector(`img[data-id="${imageId}"]`);

if (!imgElement) {
alert("Image not found.");
return;
}

cropImage.src = imgElement.src;
cropModal.style.display = "flex";

if(cropper){
cropper.destroy();
}

cropper = new Cropper(cropImage,{
viewMode: 1,
autoCropArea: 1
});
}

/* ================= SAVE CROPPED IMAGE ================= */

saveCrop.onclick = function(){

if (!cropper) return;

const canvas = cropper.getCroppedCanvas({
maxWidth: 1400,
maxHeight: 1400,
imageSmoothingQuality: "high"
});

const base64 = canvas.toDataURL("image/jpeg", 0.82);

/* ===== If Editing Existing ===== */
if (currentEditId){

fetch(`/admin/gallery/edit/${currentEditId}`, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ image: base64 })
})
.then(res => res.json())
.then(data => {
if (data.success){
location.reload();
} else {
alert("Error updating image.");
}
});

return;
}

/* ===== If Cropping New Upload ===== */

if (!currentPreviewCard) return;

currentPreviewCard.querySelector("img").src = base64;

const oldInput = currentPreviewCard.querySelector("input[type='hidden']");
if (oldInput) oldInput.remove();

const hiddenInput = document.createElement("input");
hiddenInput.type = "hidden";
hiddenInput.value = base64;

currentPreviewCard.appendChild(hiddenInput);

closeCrop();

};

/* ================= CLOSE MODAL ================= */

window.closeCrop = function(){

cropModal.style.display = "none";

if(cropper){
cropper.destroy();
cropper = null;
}

currentPreviewCard = null;
currentEditId = null;

};

/* ================= SUBMIT NEW IMAGES ================= */

form.addEventListener("submit", function(e){

e.preventDefault();

const hiddenInputs = document.querySelectorAll("#previewGrid input[type='hidden']");
const fileInput = document.getElementById("imageInput");

if (hiddenInputs.length === 0 && fileInput.files.length === 0) {
alert("Please select at least one image.");
return;
}

const images = [];
let processedCount = 0;
const totalFiles = fileInput.files.length;

/* Add cropped images */
hiddenInputs.forEach(input => {
images.push(input.value);
});

/* Convert uncropped files */
Array.from(fileInput.files).forEach(file => {

const reader = new FileReader();

reader.onload = function(event){

images.push(event.target.result);
processedCount++;

if(processedCount === totalFiles){
sendImages(images);
}

};

reader.readAsDataURL(file);

});

if(fileInput.files.length === 0){
sendImages(images);
}

});

function sendImages(images){

fetch("/admin/gallery", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ images: images })
})
.then(response => response.json())
.then(data => {

if (data.success) {
alert("Images uploaded successfully ✅");
location.reload();
} else {
alert("Upload failed ❌");
}

});

}

/* ================= DROPDOWN ================= */

window.toggleMenu = function(button) {

closeAllMenus();
button.nextElementSibling.style.display = "block";
event.stopPropagation();

}

function closeAllMenus() {
document.querySelectorAll(".dropdown-menu")
.forEach(menu => menu.style.display = "none");
}

document.addEventListener("click", function() {
closeAllMenus();
});

});
</script>





{% endblock %}
