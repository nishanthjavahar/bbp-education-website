{% extends "base.html" %}
{% set auth_page = true %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <h2>{{ role.capitalize() }} Password Reset</h2>

        <form method="POST">
            <label>Email</label>
            <input type="email" name="email" required>

            <button type="submit">Generate Reset Link</button>
        </form>

        <p style="margin-top:15px;">
            <a href="{{ url_for(role + '_login') }}">Back to Login</a>
        </p>
    </div>
</div>
{% endblock %}
