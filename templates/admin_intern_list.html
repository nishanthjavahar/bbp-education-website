{% extends "base.html" %}
{% block title %}Intern Records{% endblock %}

{% block content %}

<div style="max-width:900px; margin:40px auto;">

    <h2>Active Interns</h2>
    <hr>

    {% for intern in interns %}
    <div style="
        display:flex;
        justify-content:space-between;
        padding:15px;
        border-bottom:1px solid #ddd;
    ">

        <div>
            {{ intern.name }}
        </div>

        <div>
            <a href="{{ url_for('admin_intern_days', user_id=intern.id) }}"
               style="
                    padding:6px 12px;
                    background:#4CAF50;
                    color:white;
                    border-radius:5px;
                    text-decoration:none;
               ">
                Open
            </a>
        </div>

    </div>
    {% endfor %}

</div>

{% endblock %}
